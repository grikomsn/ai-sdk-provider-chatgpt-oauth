name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 26]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            oauth-example/package-lock.json
            oauth-web-example/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm ci
        working-directory: oauth-example
      - run: npm run typecheck
        working-directory: oauth-example
      - run: npm ci
        working-directory: oauth-web-example
      - name: Generate test session secret
        run: echo "SESSION_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
      - run: npm run check
        working-directory: oauth-web-example
